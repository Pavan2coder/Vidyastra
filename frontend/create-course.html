<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Course | Vidyastra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        (function(){try{var s=localStorage.getItem('vidyastra_appearance');if(!s)return;var p=JSON.parse(s),r=document.documentElement;['theme-default','theme-vedic','theme-modern','theme-academic'].forEach(function(c){r.classList.remove(c);});['font-default','font-sans','font-classical'].forEach(function(c){r.classList.remove(c);});r.classList.remove('mode-dark');if(p.theme)r.classList.add('theme-'+p.theme);if(p.font)r.classList.add('font-'+p.font);if(p.mode==='dark')r.classList.add('mode-dark');}catch(e){}})();
    </script>
    <link rel="stylesheet" href="css/style.css?v=2">
    <style>
        .cc-nav { background:var(--color-surface); border-bottom:1px solid var(--color-border); padding:1rem 0; position:sticky; top:0; z-index:100; }
        .cc-nav-inner { max-width:1200px; margin:0 auto; padding:0 1.5rem; display:flex; align-items:center; justify-content:space-between; }
        .cc-back { font-size:0.88rem; font-weight:600; color:var(--color-text-muted); text-decoration:none; display:inline-flex; align-items:center; gap:0.4rem; transition:color 0.15s; }
        .cc-back:hover { color:var(--color-primary); }

        .cc-page { max-width:600px; margin:3rem auto; padding:0 1.5rem 4rem; }

        .cc-card {
            background:var(--color-surface);
            border:1px solid var(--color-border);
            border-radius:8px;
            padding:2.25rem;
        }
        .cc-card-title {
            font-size:1rem; font-family:var(--font-heading); font-weight:700;
            text-transform:uppercase; letter-spacing:0.07em;
            color:var(--color-text-muted);
            margin-bottom:1.75rem;
            padding-bottom:0.75rem;
            border-bottom:1px solid var(--color-border);
        }

        .cc-field { margin-bottom:1.25rem; }
        .cc-label {
            display:block;
            font-size:0.8rem; font-weight:600;
            text-transform:uppercase; letter-spacing:0.05em;
            color:var(--color-text-muted);
            margin-bottom:0.4rem;
        }
        .cc-input, .cc-select, .cc-textarea {
            width:100%;
            padding:0.75rem 1rem;
            border:1.5px solid var(--color-border);
            border-radius:6px;
            font-family:var(--font-body);
            font-size:0.95rem;
            color:var(--color-text-main);
            background:var(--color-surface);
            transition:border-color 0.2s, box-shadow 0.2s;
            box-sizing:border-box;
        }
        .cc-input:focus, .cc-select:focus, .cc-textarea:focus {
            outline:none;
            border-color:var(--color-primary);
            box-shadow:0 0 0 3px rgba(194,65,12,0.1);
        }
        .cc-textarea { resize:vertical; min-height:110px; line-height:1.6; }

        /* Price row */
        .cc-price-wrap { position:relative; }
        .cc-price-prefix {
            position:absolute; left:1rem; top:50%; transform:translateY(-50%);
            font-weight:700; color:var(--color-text-muted); font-size:0.95rem;
            pointer-events:none;
        }
        .cc-price-wrap .cc-input { padding-left:2rem; }

        /* Success banner */
        .cc-success {
            display:none;
            margin-top:1.25rem;
            padding:0.9rem 1.1rem;
            background:#DCFCE7;
            border:1px solid #86EFAC;
            border-radius:6px;
            font-size:0.88rem;
            font-weight:600;
            color:#166534;
            text-align:center;
        }
        .cc-success.show { display:block; }
    </style>
</head>
<body class="bg-motif">

    <nav class="cc-nav">
        <div class="cc-nav-inner">
            <a href="teacher-home.html" class="cc-back">← Back to Dashboard</a>
            <a href="index.html" class="nav-brand"><span>Vidya</span>stra</a>
            <button type="button" class="appearance-toggle" aria-label="Appearance settings" aria-expanded="false" aria-controls="appearance-panel">Appearance</button>
        </div>
    </nav>

    <div class="cc-page">
        <div class="cc-card animate-on-scroll">
            <div class="cc-card-title">Create New Course</div>

            <form id="create-course-form" onsubmit="submitCourse(event)">

                <div class="cc-field">
                    <label class="cc-label" for="cc-title">Course Title</label>
                    <input id="cc-title" class="cc-input" type="text" placeholder="e.g. Vedic Mathematics — Level 1" required>
                </div>

                <div class="cc-field">
                    <label class="cc-label" for="cc-desc">Description</label>
                    <textarea id="cc-desc" class="cc-textarea" placeholder="Describe what students will learn in this course…" required></textarea>
                </div>

                <div class="cc-field">
                    <label class="cc-label" for="cc-category">Category</label>
                    <select id="cc-category" class="cc-select" required>
                        <option value="" disabled selected>Select a category</option>
                        <option>Mathematics</option>
                        <option>Science</option>
                        <option>Philosophy</option>
                        <option>Computer Science</option>
                        <option>Languages</option>
                        <option>History & Culture</option>
                        <option>Arts & Music</option>
                        <option>Health & Wellness</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="cc-field">
                    <label class="cc-label" for="cc-thumb">Thumbnail URL</label>
                    <input id="cc-thumb" class="cc-input" type="url" placeholder="https://example.com/thumbnail.jpg">
                </div>

                <div class="cc-field">
                    <label class="cc-label" for="cc-price">Price (₹)</label>
                    <div class="cc-price-wrap">
                        <span class="cc-price-prefix">₹</span>
                        <input id="cc-price" class="cc-input" type="number" min="0" placeholder="0 for free" required>
                    </div>
                </div>

                <button type="submit" class="btn" style="width:100%;margin-top:0.5rem;">Create Course</button>

                <div class="cc-success" id="cc-success">✓ Course created successfully!</div>
            </form>
        </div>
    </div>

    <!-- Appearance Panel -->
    <div id="appearance-panel" class="appearance-panel" aria-hidden="true" hidden>
        <div class="appearance-panel-header">Appearance</div>
        <div class="appearance-panel-body">
            <div class="appearance-panel-row">
                <label class="appearance-toggle-label"><input type="checkbox" class="appearance-dark-toggle"><span>Dark mode</span></label>
            </div>
            <div class="appearance-panel-row">
                <span class="appearance-field-label">Theme</span>
                <select id="appearance-theme-select" class="appearance-select">
                    <option value="default">Default Light</option>
                    <option value="vedic">Vedic Warm</option>
                    <option value="modern">Modern Minimal</option>
                    <option value="academic">Academic Calm</option>
                </select>
            </div>
            <div class="appearance-panel-row">
                <span class="appearance-field-label">Font</span>
                <select id="appearance-font-select" class="appearance-select">
                    <option value="default">Default Serif</option>
                    <option value="sans">Clean Sans-Serif</option>
                    <option value="classical">Traditional Classical Serif</option>
                </select>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        async function submitCourse(e) {
            e.preventDefault();
            const btn = e.target.querySelector('[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Creating…';

            const payload = {
                title:       document.getElementById('cc-title').value.trim(),
                description: document.getElementById('cc-desc').value.trim(),
                category:    document.getElementById('cc-category').value,
                level:       'Beginner',
                duration:    'TBD',
            };

            try {
                await apiCreateCourse(payload);
                document.getElementById('cc-success').classList.add('show');
                btn.textContent = '✓ Course Created';
                e.target.reset();
                setTimeout(() => {
                    document.getElementById('cc-success').classList.remove('show');
                    btn.disabled = false;
                    btn.textContent = 'Create Course';
                }, 3500);
            } catch (err) {
                const errEl = document.getElementById('cc-success');
                errEl.style.background = '#FEE2E2';
                errEl.style.color = '#991B1B';
                errEl.style.borderColor = '#FECACA';
                errEl.textContent = '✗ ' + err.message;
                errEl.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Create Course';
            }
        }
    </script>
    <script src="js/main.js?v=2"></script>
</body>
</html>
