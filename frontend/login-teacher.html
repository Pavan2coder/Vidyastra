<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guru Login | Vidyastra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>(function(){try{var s=localStorage.getItem('vidyastra_appearance');if(!s)return;var p=JSON.parse(s),r=document.documentElement;['theme-default','theme-vedic','theme-modern','theme-academic'].forEach(function(c){r.classList.remove(c);});['font-default','font-sans','font-classical'].forEach(function(c){r.classList.remove(c);});r.classList.remove('mode-dark');if(p.theme)r.classList.add('theme-'+p.theme);if(p.font)r.classList.add('font-'+p.font);if(p.mode==='dark')r.classList.add('mode-dark');}catch(e){}})();</script>
    <link rel="stylesheet" href="css/style.css?v=2">
    <style>
        .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem 1rem; }
        .login-card { background:var(--color-surface); border:1px solid var(--color-border); border-top:5px solid var(--color-secondary); border-radius:8px; padding:2.5rem; width:100%; max-width:440px; box-shadow:0 8px 30px rgba(0,0,0,0.08); }
        .login-logo { text-align:center; margin-bottom:1.5rem; }
        .login-logo a { font-family:var(--font-heading); font-size:1.6rem; font-weight:800; color:var(--color-primary); text-decoration:none; }
        .login-title { text-align:center; margin-bottom:0.4rem; font-size:1.4rem; color:var(--color-secondary); }
        .login-sub { text-align:center; color:var(--color-text-muted); font-size:0.9rem; margin-bottom:2rem; }
        .lf { margin-bottom:1.1rem; }
        .lf label { display:block; font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--color-text-muted); margin-bottom:0.35rem; }
        .lf input { width:100%; padding:0.75rem 1rem; border:1.5px solid var(--color-border); border-radius:6px; font-family:var(--font-body); font-size:0.95rem; color:var(--color-text-main); background:var(--color-surface); box-sizing:border-box; transition:border-color 0.2s; }
        .lf input:focus { outline:none; border-color:var(--color-secondary); }
        .login-btn { width:100%; padding:0.85rem; margin-top:0.5rem; border-radius:6px; border:none; background:var(--color-secondary); color:#fff; font-size:0.95rem; font-weight:700; cursor:pointer; font-family:var(--font-body); transition:opacity 0.2s; }
        .login-btn:hover { opacity:0.88; }
        .login-footer { text-align:center; margin-top:1.25rem; font-size:0.85rem; color:var(--color-text-muted); }
        .login-footer a { color:var(--color-secondary); font-weight:600; text-decoration:none; }
    </style>
</head>
<body class="bg-motif">
    <div class="login-wrap">
        <div class="login-card">
            <div class="login-logo"><a href="index.html">Vidyastra</a></div>
            <h2 class="login-title">Welcome, Acharya</h2>
            <p class="login-sub">Guide and inspire your seekers.</p>
            <div class="lf"><label>Email Address</label><input type="email" placeholder="Enter your email"></div>
            <div class="lf"><label>Password</label><input type="password" placeholder="••••••••"></div>
            <button class="login-btn" onclick="window.location.href='teacher-home.html'">Enter Staff Room</button>
            <div class="login-footer">
                New here? <a href="signup-teacher.html">Enroll to join</a> &nbsp;·&nbsp; <a href="choose-path.html">Change Role</a>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
    <script src="js/main.js?v=2"></script>
</body>
</html>
