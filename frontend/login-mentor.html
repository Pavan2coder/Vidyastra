<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saarthi Login | Vidyastra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        (function(){try{var s=localStorage.getItem('vidyastra_appearance');if(!s)return;var p=JSON.parse(s),r=document.documentElement;['theme-default','theme-vedic','theme-modern','theme-academic'].forEach(function(c){r.classList.remove(c);});['font-default','font-sans','font-classical'].forEach(function(c){r.classList.remove(c);});r.classList.remove('mode-dark');if(p.theme)r.classList.add('theme-'+p.theme);if(p.font)r.classList.add('font-'+p.font);if(p.mode==='dark')r.classList.add('mode-dark');}catch(e){}})();
    </script>
    <link rel="stylesheet" href="css/style.css?v=2">
    <style>
        .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem 1rem; }
        .login-card {
            background:var(--color-surface);
            border:2px solid #111;
            border-top:5px solid #111;
            border-radius:8px;
            padding:2.5rem;
            width:100%; max-width:440px;
            box-shadow:0 8px 30px rgba(0,0,0,0.08);
            opacity:1 !important;
            transform:none !important;
        }
        .login-logo { text-align:center; margin-bottom:1.5rem; }
        .login-logo a { font-family:var(--font-heading); font-size:1.6rem; font-weight:800; color:#111; text-decoration:none; }
        .login-title { text-align:center; margin-bottom:0.4rem; font-size:1.4rem; color:#111; font-family:var(--font-heading); }
        .login-sub   { text-align:center; color:#555; font-size:0.9rem; margin-bottom:2rem; }
        .lf { margin-bottom:1.1rem; }
        .lf label { display:block; font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:#333; margin-bottom:0.4rem; }
        .lf input {
            width:100%; padding:0.75rem 1rem;
            border:1.5px solid #111; border-radius:6px;
            font-family:var(--font-body); font-size:0.95rem;
            color:#111; background:var(--color-surface);
            box-sizing:border-box; transition:border-color 0.2s;
        }
        .lf input:focus { outline:none; border-color:#000; box-shadow:0 0 0 3px rgba(0,0,0,0.08); }
        .login-btn {
            width:100%; padding:0.85rem; margin-top:0.5rem;
            border-radius:6px; border:2px solid #111;
            background:#111; color:#fff;
            font-size:0.95rem; font-weight:700;
            cursor:pointer; font-family:var(--font-body);
            transition:background 0.2s;
            opacity:1 !important;
            visibility:visible !important;
            display:block !important;
        }
        .login-btn:hover { background:#333; }
        .login-footer { text-align:center; margin-top:1.25rem; font-size:0.85rem; color:#333; }
        .login-footer a { color:#111; font-weight:600; text-decoration:none; }
        .login-footer a:hover { text-decoration:underline; }
    </style>
</head>
<body class="bg-motif">
    <div class="login-wrap">
        <div class="login-card">
            <div class="login-logo"><a href="index.html"><span style="color:var(--color-primary);">Vidya</span>stra</a></div>
            <h2 class="login-title">Welcome, Saarthi</h2>
            <p class="login-sub">Lead the way for your students.</p>
            <div class="lf"><label>Email Address</label><input type="email" placeholder="Enter your email"></div>
            <div class="lf"><label>Password</label><input type="password" placeholder="••••••••"></div>
            <button class="login-btn" onclick="window.location.href='mentor-home.html'">Enter Portal</button>
            <div class="login-footer">
                New here? <a href="mentor-application.html">Apply to join</a> &nbsp;·&nbsp; <a href="choose-path.html">Change Role</a>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
