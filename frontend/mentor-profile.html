<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mentor Profile | Vidyastra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #111; }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: #fff; border-bottom: 2px solid #111;
        }
        .navbar h2 { font-size: 1.2rem; }
        .navbar a { color: #111; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .navbar a:hover { text-decoration: underline; }

        .page { max-width: 560px; margin: 40px auto; padding: 0 20px 60px; }

        /* Avatar */
        .avatar-wrap { text-align: center; margin-bottom: 28px; }
        .avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: #111; color: #fff;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 700; margin-bottom: 10px;
        }
        .avatar-name { font-size: 1.1rem; font-weight: 700; }
        .avatar-role {
            display: inline-block; margin-top: 6px;
            padding: 3px 12px; border-radius: 999px;
            background: #111; color: #fff;
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
        }

        /* Card */
        .card {
            background: #fff; border: 2px solid #111;
            border-radius: 10px; padding: 28px;
            box-shadow: 3px 3px 0 #111;
        }
        .card-title {
            font-size: 0.78rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.07em;
            color: #555; margin-bottom: 20px;
            padding-bottom: 10px; border-bottom: 1px solid #ddd;
        }

        .field { margin-bottom: 18px; }
        .field label {
            display: block; font-size: 0.78rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.05em;
            color: #555; margin-bottom: 6px;
        }
        .field input, .field select, .field textarea {
            width: 100%; padding: 10px 14px;
            border: 2px solid #111; border-radius: 6px;
            font-family: Arial; font-size: 0.95rem; color: #111;
            background: #fff; transition: border-color 0.15s;
        }
        .field input:focus, .field select:focus, .field textarea:focus {
            outline: none; border-color: #444;
        }
        .field textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
        .field input:disabled { background: #f0f0f0; color: #888; cursor: not-allowed; border-color: #ddd; }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media(max-width:480px){ .row { grid-template-columns: 1fr; } }

        .save-btn {
            width: 100%; padding: 12px;
            background: #111; color: #fff;
            border: 2px solid #111; border-radius: 8px;
            font-size: 0.95rem; font-weight: 700;
            cursor: pointer; font-family: Arial;
            margin-top: 8px; transition: background 0.15s;
            box-shadow: 2px 2px 0 #555;
        }
        .save-btn:hover { background: #333; }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>Vidyastra · Mentor</h2>
        <a href="mentor-home.html">← Back to Dashboard</a>
    </div>

    <div class="page">

        <!-- Avatar -->
        <div class="avatar-wrap">
            <div class="avatar" id="profile-avatar">RS</div>
            <div class="avatar-name" id="profile-display-name">Ramakant Shastri</div>
            <div class="avatar-role">Saarthi · Mentor</div>
        </div>

        <!-- Form -->
        <div class="card">
            <div class="card-title">Edit Profile</div>

            <div class="field">
                <label>Full Name</label>
                <input type="text" id="f-name" placeholder="Your full name">
            </div>

            <div class="field">
                <label>Email Address</label>
                <input type="email" id="f-email" placeholder="mentor@vidyastra.com" disabled>
            </div>

            <div class="row">
                <div class="field">
                    <label>Area of Expertise</label>
                    <select id="f-expertise">
                        <option>Vedic Sciences</option>
                        <option>Mathematics</option>
                        <option>Computer Science</option>
                        <option>Physics</option>
                        <option>Life Sciences</option>
                        <option>Philosophy</option>
                        <option>History & Culture</option>
                        <option>Career Guidance</option>
                    </select>
                </div>
                <div class="field">
                    <label>Years of Experience</label>
                    <input type="number" id="f-experience" min="0" max="50" placeholder="e.g. 10">
                </div>
            </div>

            <div class="field">
                <label>Professional Title</label>
                <input type="text" id="f-title" placeholder="e.g. Senior Engineer at TechCorp">
            </div>

            <div class="field">
                <label>Bio</label>
                <textarea id="f-bio" placeholder="Tell students about yourself…"></textarea>
            </div>

            <button class="save-btn" onclick="saveProfile()">Save Profile</button>
        </div>
    </div>

    <script>
        var KEY = 'vd_mentor_profile';

        // Load saved or defaults
        var defaults = {
            name: 'Ramakant Shastri',
            email: 'mentor@vidyastra.com',
            expertise: 'Vedic Sciences',
            experience: '20',
            title: 'Vedic Scholar & Educator',
            bio: '20+ years teaching Vedic traditions. I guide students in classical learning and modern applications.'
        };

        var saved = {};
        try { saved = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch(e) {}

        // Also pull name from auth_user
        try {
            var u = JSON.parse(localStorage.getItem('auth_user') || 'null');
            if (u && u.name)  defaults.name  = u.name;
            if (u && u.email) defaults.email = u.email;
        } catch(e) {}

        var data = Object.assign({}, defaults, saved);

        document.getElementById('f-name').value       = data.name;
        document.getElementById('f-email').value      = data.email;
        document.getElementById('f-expertise').value  = data.expertise;
        document.getElementById('f-experience').value = data.experience;
        document.getElementById('f-title').value      = data.title;
        document.getElementById('f-bio').value        = data.bio;

        function initials(name) {
            var p = (name || 'S').trim().split(' ');
            return p.length >= 2 ? (p[0][0] + p[p.length-1][0]).toUpperCase() : (name || 'S').slice(0,2).toUpperCase();
        }

        function updateDisplay(name) {
            document.getElementById('profile-avatar').textContent      = initials(name);
            document.getElementById('profile-display-name').textContent = name;
        }

        updateDisplay(data.name);

        function saveProfile() {
            var name = document.getElementById('f-name').value.trim();
            if (!name) { document.getElementById('f-name').focus(); return; }

            var updated = {
                name:       name,
                email:      data.email,
                expertise:  document.getElementById('f-expertise').value,
                experience: document.getElementById('f-experience').value,
                title:      document.getElementById('f-title').value.trim(),
                bio:        document.getElementById('f-bio').value.trim()
            };

            localStorage.setItem(KEY, JSON.stringify(updated));
            localStorage.setItem('userName', name);
            try {
                var u = JSON.parse(localStorage.getItem('auth_user') || 'null');
                if (u) { u.name = name; localStorage.setItem('auth_user', JSON.stringify(u)); }
            } catch(e) {}

            updateDisplay(name);
            data = updated;

            alert('✓ Profile Updated!');
        }
    </script>
</body>
</html>
