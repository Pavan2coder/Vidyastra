<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Sessions | Vidyastra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #111; }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: #fff; border-bottom: 2px solid #111;
        }
        .navbar h2 { font-size: 1.2rem; }
        .navbar a { color: #111; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .navbar a:hover { text-decoration: underline; }

        .page { padding: 30px; }
        .page h1 { font-size: 1.5rem; margin-bottom: 6px; }
        .page p  { color: #555; font-size: 0.9rem; margin-bottom: 24px; }

        table {
            width: 100%; border-collapse: collapse;
            background: #fff; border: 2px solid #111;
            border-radius: 8px; overflow: hidden;
            box-shadow: 3px 3px 0 #111;
        }
        thead { background: #111; color: #fff; }
        th { padding: 14px 16px; text-align: left; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; }
        td { padding: 14px 16px; border-bottom: 1px solid #eee; font-size: 0.9rem; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }

        .avatar {
            width: 34px; height: 34px; border-radius: 50%;
            background: #111; color: #fff;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700; margin-right: 8px;
            vertical-align: middle;
        }

        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 999px;
            font-size: 0.72rem; font-weight: 700;
        }
        .badge.live     { background: #fee2e2; color: #991b1b; }
        .badge.upcoming { background: #e0e7ff; color: #3730a3; }
        .badge.done     { background: #d1fae5; color: #065f46; }

        .join-btn {
            padding: 8px 18px; border-radius: 6px;
            border: 2px solid #111; background: #111; color: #fff;
            font-size: 0.82rem; font-weight: 700; cursor: pointer;
            font-family: Arial; transition: background 0.15s;
        }
        .join-btn:hover { background: #333; }
        .join-btn:disabled { background: #ccc; border-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>Vidyastra · Mentor</h2>
        <a href="mentor-home.html">← Back to Dashboard</a>
    </div>

    <div class="page">
        <h1>My Sessions</h1>
        <p>View and join your scheduled mentoring sessions.</p>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Student</th>
                    <th>Topic</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="sessions-tbody"></tbody>
        </table>
    </div>

    <script>
        var sessions = [
            { name: 'Arjun Kumar',   topic: 'Career Guidance',        time: 'Today, 18:00 IST',    status: 'live'     },
            { name: 'Priya Sharma',  topic: 'Web Dev Project Review', time: 'Today, 20:00 IST',    status: 'upcoming' },
            { name: 'Rohan Mehta',   topic: 'JEE Study Plan',         time: 'Tomorrow, 10:00 IST', status: 'upcoming' },
            { name: 'Ananya Singh',  topic: 'Vedanta Philosophy',     time: '25 Mar, 16:00 IST',   status: 'upcoming' },
            { name: 'Sneha Patel',   topic: 'Sanskrit Practice',      time: '26 Mar, 11:00 IST',   status: 'upcoming' },
            { name: 'Vikram Nair',   topic: 'Calculus Doubts',        time: '24 Mar, 14:00 IST',   status: 'done'     },
            { name: 'Meera Iyer',    topic: 'Web Dev Basics',         time: '23 Mar, 11:00 IST',   status: 'done'     },
        ];

        function initials(name) {
            var p = name.trim().split(' ');
            return p.length >= 2 ? (p[0][0] + p[p.length-1][0]).toUpperCase() : name.slice(0,2).toUpperCase();
        }

        function badgeLabel(s) {
            return s === 'live' ? '🔴 Live Now' : s === 'upcoming' ? 'Upcoming' : 'Completed';
        }

        function joinSession(name) {
            alert('Joining session with ' + name + '…\nVideo call feature coming soon!');
        }

        var tbody = document.getElementById('sessions-tbody');
        tbody.innerHTML = sessions.map(function(s, i) {
            var isDone    = s.status === 'done';
            var btnHtml   = isDone
                ? '<button class="join-btn" disabled>Completed</button>'
                : '<button class="join-btn" onclick="joinSession(\'' + s.name + '\')">▶ Join</button>';
            return '<tr>' +
                '<td>' + (i + 1) + '</td>' +
                '<td><span class="avatar">' + initials(s.name) + '</span>' + s.name + '</td>' +
                '<td>' + s.topic + '</td>' +
                '<td style="color:#555;font-size:0.85rem;">' + s.time + '</td>' +
                '<td><span class="badge ' + s.status + '">' + badgeLabel(s.status) + '</span></td>' +
                '<td>' + btnHtml + '</td>' +
            '</tr>';
        }).join('');
    </script>
</body>
</html>
