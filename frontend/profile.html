<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Vidyastra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        (function(){try{var s=localStorage.getItem('vidyastra_appearance');if(!s)return;var p=JSON.parse(s),r=document.documentElement;['theme-default','theme-vedic','theme-modern','theme-academic'].forEach(function(c){r.classList.remove(c);});['font-default','font-sans','font-classical'].forEach(function(c){r.classList.remove(c);});r.classList.remove('mode-dark');if(p.theme)r.classList.add('theme-'+p.theme);if(p.font)r.classList.add('font-'+p.font);if(p.mode==='dark')r.classList.add('mode-dark');}catch(e){}})();
    </script>
    <link rel="stylesheet" href="css/style.css?v=2">
    <style>
        .pf-nav { background:var(--color-surface); border-bottom:1px solid var(--color-border); padding:1rem 0; position:sticky; top:0; z-index:100; }
        .pf-nav-inner { max-width:1200px; margin:0 auto; padding:0 1.5rem; display:flex; align-items:center; justify-content:space-between; gap:1rem; }
        .pf-nav-links { display:flex; align-items:center; gap:0.25rem; list-style:none; }
        .pf-nav-links a { padding:0.4rem 0.85rem; border-radius:6px; font-size:0.9rem; font-weight:500; color:var(--color-text-main); text-decoration:none; transition:background 0.15s,color 0.15s; }
        .pf-nav-links a:hover, .pf-nav-links a.active { background:var(--color-bg-alt); color:var(--color-primary); }

        /* Page */
        .pf-page { max-width:560px; margin:3.5rem auto; padding:0 1.5rem 4rem; }

        /* Avatar */
        .pf-avatar-wrap { display:flex; flex-direction:column; align-items:center; margin-bottom:2rem; }
        .pf-avatar {
            width:80px; height:80px;
            border-radius:50%;
            background:var(--color-primary);
            color:#fff;
            display:flex; align-items:center; justify-content:center;
            font-size:1.75rem;
            font-weight:700;
            font-family:var(--font-heading);
            margin-bottom:0.75rem;
        }
        .pf-role-badge {
            font-size:0.75rem;
            font-weight:700;
            text-transform:uppercase;
            letter-spacing:0.07em;
            background:var(--color-bg-alt);
            border:1px solid var(--color-border);
            color:var(--color-text-muted);
            padding:0.25rem 0.85rem;
            border-radius:999px;
        }

        /* Card */
        .pf-card {
            background:var(--color-surface);
            border:1px solid var(--color-border);
            border-radius:8px;
            padding:2rem;
        }
        .pf-card-title {
            font-size:1rem;
            font-family:var(--font-heading);
            font-weight:700;
            text-transform:uppercase;
            letter-spacing:0.07em;
            color:var(--color-text-muted);
            margin-bottom:1.5rem;
            padding-bottom:0.75rem;
            border-bottom:1px solid var(--color-border);
        }

        /* Form */
        .pf-field { margin-bottom:1.25rem; }
        .pf-label {
            display:block;
            font-size:0.8rem;
            font-weight:600;
            text-transform:uppercase;
            letter-spacing:0.05em;
            color:var(--color-text-muted);
            margin-bottom:0.4rem;
        }
        .pf-input {
            width:100%;
            padding:0.75rem 1rem;
            border:1.5px solid var(--color-border);
            border-radius:6px;
            font-family:var(--font-body);
            font-size:0.95rem;
            color:var(--color-text-main);
            background:var(--color-surface);
            transition:border-color 0.2s, box-shadow 0.2s;
            box-sizing:border-box;
        }
        .pf-input:focus { outline:none; border-color:var(--color-primary); box-shadow:0 0 0 3px rgba(194,65,12,0.1); }
        .pf-input:disabled { background:var(--color-bg-alt); color:var(--color-text-muted); cursor:not-allowed; }

        /* Success toast */
        .pf-toast {
            display:none;
            margin-top:1rem;
            padding:0.75rem 1rem;
            background:#DCFCE7;
            border:1px solid #86EFAC;
            border-radius:6px;
            font-size:0.85rem;
            font-weight:600;
            color:#166534;
            text-align:center;
        }
        .pf-toast.show { display:block; }

        .pf-actions { display:flex; gap:0.75rem; margin-top:1.5rem; }
    </style>
</head>
<body class="bg-motif">

    <nav class="pf-nav">
        <div class="pf-nav-inner">
            <a href="index.html" class="nav-brand"><span>Vidya</span>stra</a>
            <ul class="pf-nav-links">
                <li><a href="learning-home.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="progress.html">Progress</a></li>
                <li><a href="profile.html" class="active">Profile</a></li>
            </ul>
            <button type="button" class="appearance-toggle" aria-label="Appearance settings" aria-expanded="false" aria-controls="appearance-panel">Appearance</button>
        </div>
    </nav>

    <div class="pf-page">

        <!-- Avatar -->
        <div class="pf-avatar-wrap animate-on-scroll">
            <div class="pf-avatar" id="pf-avatar">S</div>
            <span class="pf-role-badge">Student</span>
        </div>

        <!-- Profile card -->
        <div class="pf-card animate-on-scroll">
            <div class="pf-card-title">My Profile</div>

            <div class="pf-field">
                <label class="pf-label" for="pf-name">Full Name</label>
                <input id="pf-name" class="pf-input" type="text" placeholder="Enter your name">
            </div>

            <div class="pf-field">
                <label class="pf-label" for="pf-email">Email Address</label>
                <input id="pf-email" class="pf-input" type="email" placeholder="student@vidyastra.com" disabled>
            </div>

            <div class="pf-field">
                <label class="pf-label" for="pf-role">Role</label>
                <input id="pf-role" class="pf-input" type="text" value="Student" disabled>
            </div>

            <div class="pf-actions">
                <button class="btn" onclick="saveProfile()">Save Changes</button>
                <a href="learning-home.html" class="btn btn-outline">Cancel</a>
            </div>

            <div class="pf-toast" id="pf-toast">✓ Profile updated successfully!</div>
        </div>

    </div>

    <!-- Appearance Panel -->
    <div id="appearance-panel" class="appearance-panel" aria-hidden="true" hidden>
        <div class="appearance-panel-header">Appearance</div>
        <div class="appearance-panel-body">
            <div class="appearance-panel-row">
                <label class="appearance-toggle-label"><input type="checkbox" class="appearance-dark-toggle"><span>Dark mode</span></label>
            </div>
            <div class="appearance-panel-row">
                <span class="appearance-field-label">Theme</span>
                <select id="appearance-theme-select" class="appearance-select">
                    <option value="default">Default Light</option>
                    <option value="vedic">Vedic Warm</option>
                    <option value="modern">Modern Minimal</option>
                    <option value="academic">Academic Calm</option>
                </select>
            </div>
            <div class="appearance-panel-row">
                <span class="appearance-field-label">Font</span>
                <select id="appearance-font-select" class="appearance-select">
                    <option value="default">Default Serif</option>
                    <option value="sans">Clean Sans-Serif</option>
                    <option value="classical">Traditional Classical Serif</option>
                </select>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/main.js?v=2"></script>
</body>
</html>
