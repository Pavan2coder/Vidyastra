<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mentor Requests | Vidyastra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #111; }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: #fff; border-bottom: 2px solid #111;
        }
        .navbar h2 { font-size: 1.2rem; }
        .navbar a { color: #111; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .navbar a:hover { text-decoration: underline; }

        .page { padding: 30px; }
        .page h1 { font-size: 1.5rem; margin-bottom: 6px; }
        .page p  { color: #555; font-size: 0.9rem; margin-bottom: 24px; }

        table {
            width: 100%; border-collapse: collapse;
            background: #fff; border: 2px solid #111;
            border-radius: 8px; overflow: hidden;
            box-shadow: 3px 3px 0 #111;
        }
        thead { background: #111; color: #fff; }
        th { padding: 14px 16px; text-align: left; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; }
        td { padding: 14px 16px; border-bottom: 1px solid #eee; font-size: 0.9rem; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }

        .avatar {
            width: 34px; height: 34px; border-radius: 50%;
            background: #111; color: #fff;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700; margin-right: 8px;
            vertical-align: middle;
        }

        .btn {
            padding: 7px 16px; border-radius: 6px; border: 2px solid #111;
            font-size: 0.8rem; font-weight: 700; cursor: pointer;
            font-family: Arial; transition: 0.15s;
        }
        .btn-accept { background: #111; color: #fff; margin-right: 6px; }
        .btn-accept:hover { background: #333; }
        .btn-reject { background: #fff; color: #111; }
        .btn-reject:hover { background: #f0f0f0; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .status {
            display: inline-block; padding: 4px 10px; border-radius: 999px;
            font-size: 0.75rem; font-weight: 700;
        }
        .status.accepted { background: #d1fae5; color: #065f46; }
        .status.rejected { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>Vidyastra · Mentor</h2>
        <a href="mentor-home.html">← Back to Dashboard</a>
    </div>

    <div class="page">
        <h1>Mentor Requests</h1>
        <p>Review and respond to student connection requests.</p>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Student</th>
                    <th>Topic</th>
                    <th>Received</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="requests-tbody"></tbody>
        </table>
    </div>

    <script>
        var requests = [
            { name: 'Rahul Sharma',   topic: 'Career Guidance',           time: '2 min ago'  },
            { name: 'Priya Singh',    topic: 'Web Development Doubts',    time: '15 min ago' },
            { name: 'Arjun Kumar',    topic: 'JEE Study Plan',            time: '1 hr ago'   },
            { name: 'Ananya Mehta',   topic: 'Vedanta Philosophy',        time: '2 hr ago'   },
            { name: 'Vikram Nair',    topic: 'Mathematics — Calculus',    time: '3 hr ago'   },
            { name: 'Sneha Patel',    topic: 'Sanskrit Reading Practice', time: 'Yesterday'  },
            { name: 'Karan Joshi',    topic: 'Data Science Roadmap',      time: 'Yesterday'  },
        ];

        function initials(name) {
            var p = name.trim().split(' ');
            return p.length >= 2 ? (p[0][0] + p[p.length-1][0]).toUpperCase() : name.slice(0,2).toUpperCase();
        }

        function respond(i, action) {
            var acceptBtn = document.getElementById('accept-' + i);
            var rejectBtn = document.getElementById('reject-' + i);
            var cell      = document.getElementById('action-' + i);

            acceptBtn.disabled = true;
            rejectBtn.disabled = true;

            var label = action === 'accept' ? 'accepted' : 'rejected';
            cell.innerHTML = '<span class="status ' + label + '">' + (action === 'accept' ? '✓ Accepted' : '✗ Rejected') + '</span>';

            alert(action === 'accept'
                ? '✓ Request from ' + requests[i].name + ' accepted!'
                : '✗ Request from ' + requests[i].name + ' rejected.');
        }

        var tbody = document.getElementById('requests-tbody');
        tbody.innerHTML = requests.map(function(r, i) {
            return '<tr>' +
                '<td>' + (i + 1) + '</td>' +
                '<td><span class="avatar">' + initials(r.name) + '</span>' + r.name + '</td>' +
                '<td>' + r.topic + '</td>' +
                '<td style="color:#888;font-size:0.82rem;">' + r.time + '</td>' +
                '<td id="action-' + i + '">' +
                    '<button class="btn btn-accept" id="accept-' + i + '" onclick="respond(' + i + ',\'accept\')">✓ Accept</button>' +
                    '<button class="btn btn-reject" id="reject-' + i + '" onclick="respond(' + i + ',\'reject\')">✗ Reject</button>' +
                '</td>' +
            '</tr>';
        }).join('');
    </script>
</body>
</html>
